name: External E2E

on:
  workflow_dispatch:
    inputs:
      phases:
        description: "Comma-separated phases, or alias: quick, smoke, all"
        required: false
        default: "smoke"
      full_collab:
        description: "Run all MiniMax collaboration E2E scenarios"
        required: false
        type: boolean
        default: false
      allow_missing_secrets:
        description: "Skip secret-backed phases instead of failing"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: external-e2e-${{ github.ref }}
  cancel-in-progress: false

jobs:
  external-e2e:
    name: External Provider E2E
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend_wip/package-lock.json

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install backend dependencies
        run: uv sync --extra dev --frozen

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend_wip

      - name: Install Playwright Chromium
        run: uv run --extra dev playwright install --with-deps chromium

      - name: Mask injected secrets
        shell: bash
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || vars.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || vars.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY || vars.QWEN_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || vars.DASHSCOPE_API_KEY }}
          MEMOX_FILE_SIGNING_SECRET: ${{ secrets.MEMOX_FILE_SIGNING_SECRET || vars.MEMOX_FILE_SIGNING_SECRET }}
          MEMOX_ADMIN_PASSWORD: ${{ secrets.MEMOX_ADMIN_PASSWORD || vars.MEMOX_ADMIN_PASSWORD }}
        run: |
          for value in \
            "$MINIMAX_API_KEY" \
            "$DEEPSEEK_API_KEY" \
            "$QWEN_API_KEY" \
            "$DASHSCOPE_API_KEY" \
            "$MEMOX_FILE_SIGNING_SECRET" \
            "$MEMOX_ADMIN_PASSWORD"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done

      - name: Run external E2E
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || vars.MINIMAX_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || vars.DEEPSEEK_API_KEY }}
          QWEN_API_KEY: ${{ secrets.QWEN_API_KEY || vars.QWEN_API_KEY }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY || vars.DASHSCOPE_API_KEY }}
          MEMOX_FILE_SIGNING_SECRET: ${{ secrets.MEMOX_FILE_SIGNING_SECRET || vars.MEMOX_FILE_SIGNING_SECRET }}
          MEMOX_ADMIN_PASSWORD: ${{ secrets.MEMOX_ADMIN_PASSWORD || vars.MEMOX_ADMIN_PASSWORD }}
          QWEN_MODEL: ${{ vars.QWEN_MODEL || 'qwen-plus' }}
          I2V_TEST_MODEL: ${{ vars.I2V_TEST_MODEL || 'wan2.7-i2v' }}
          I2V_TEST_EDIT_MODEL: ${{ vars.I2V_TEST_EDIT_MODEL || 'wan2.7-videoedit' }}
          I2V_TEST_RESOLUTION: ${{ vars.I2V_TEST_RESOLUTION || '720P' }}
          I2V_TEST_DURATION: ${{ vars.I2V_TEST_DURATION || '5' }}
        run: |
          args=(--phases "${{ inputs.phases }}" --report-path external-e2e-report.md)
          if [ "${{ inputs.full_collab }}" = "true" ]; then
            args+=(--full-collab)
          fi
          if [ "${{ inputs.allow_missing_secrets }}" = "true" ]; then
            args+=(--allow-missing-secrets)
          fi
          uv run --extra dev python scripts/run_external_e2e.py "${args[@]}"

      - name: Upload E2E report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: external-e2e-report
          path: external-e2e-report.md
          if-no-files-found: warn
