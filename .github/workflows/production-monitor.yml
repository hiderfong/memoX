name: Production Monitor

on:
  workflow_dispatch:
    inputs:
      strict:
        description: "Fail the workflow on warning as well as error"
        required: false
        type: boolean
        default: true
      max_media_pending:
        description: "Maximum allowed runtime pending media jobs"
        required: false
        default: "10"
      max_media_persisted_queued:
        description: "Maximum allowed persisted queued media jobs"
        required: false
        default: "20"
      max_media_persisted_running:
        description: "Maximum allowed persisted running media jobs"
        required: false
        default: "4"
      max_recent_tool_rejections:
        description: "Maximum allowed recent rejected tool calls"
        required: false
        default: "20"
      max_recent_tool_errors:
        description: "Maximum allowed recent errored tool calls"
        required: false
        default: "0"
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: production-monitor-${{ github.ref }}
  cancel-in-progress: true

jobs:
  monitor:
    name: Production Monitoring Probe
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Mask monitor secrets
        shell: bash
        env:
          MEMOX_URL: ${{ secrets.MEMOX_PRODUCTION_URL || vars.MEMOX_PRODUCTION_URL }}
          MEMOX_TOKEN: ${{ secrets.MEMOX_PRODUCTION_TOKEN || vars.MEMOX_PRODUCTION_TOKEN }}
          MEMOX_ADMIN_PASSWORD: ${{ secrets.MEMOX_PRODUCTION_ADMIN_PASSWORD || vars.MEMOX_PRODUCTION_ADMIN_PASSWORD }}
        run: |
          for value in "$MEMOX_URL" "$MEMOX_TOKEN" "$MEMOX_ADMIN_PASSWORD"; do
            if [ -n "$value" ]; then
              echo "::add-mask::$value"
            fi
          done

      - name: Validate monitor configuration
        shell: bash
        env:
          MEMOX_URL: ${{ secrets.MEMOX_PRODUCTION_URL || vars.MEMOX_PRODUCTION_URL }}
          MEMOX_TOKEN: ${{ secrets.MEMOX_PRODUCTION_TOKEN || vars.MEMOX_PRODUCTION_TOKEN }}
          MEMOX_ADMIN_PASSWORD: ${{ secrets.MEMOX_PRODUCTION_ADMIN_PASSWORD || vars.MEMOX_PRODUCTION_ADMIN_PASSWORD }}
        run: |
          missing=()
          if [ -z "$MEMOX_URL" ]; then
            missing+=("MEMOX_PRODUCTION_URL")
          fi
          if [ -z "$MEMOX_TOKEN" ] && [ -z "$MEMOX_ADMIN_PASSWORD" ]; then
            missing+=("MEMOX_PRODUCTION_TOKEN or MEMOX_PRODUCTION_ADMIN_PASSWORD")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required production monitor secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Run production monitor
        env:
          MEMOX_URL: ${{ secrets.MEMOX_PRODUCTION_URL || vars.MEMOX_PRODUCTION_URL }}
          MEMOX_TOKEN: ${{ secrets.MEMOX_PRODUCTION_TOKEN || vars.MEMOX_PRODUCTION_TOKEN }}
          MEMOX_ADMIN_PASSWORD: ${{ secrets.MEMOX_PRODUCTION_ADMIN_PASSWORD || vars.MEMOX_PRODUCTION_ADMIN_PASSWORD }}
          STRICT_INPUT: ${{ github.event_name == 'workflow_dispatch' && toJSON(inputs.strict) || 'true' }}
          MAX_MEDIA_PENDING_INPUT: ${{ inputs.max_media_pending || '10' }}
          MAX_MEDIA_PERSISTED_QUEUED_INPUT: ${{ inputs.max_media_persisted_queued || '20' }}
          MAX_MEDIA_PERSISTED_RUNNING_INPUT: ${{ inputs.max_media_persisted_running || '4' }}
          MAX_RECENT_TOOL_ERRORS_INPUT: ${{ inputs.max_recent_tool_errors || '0' }}
          MAX_RECENT_TOOL_REJECTIONS_INPUT: ${{ inputs.max_recent_tool_rejections || '20' }}
        run: |
          args=(
            --max-media-pending "$MAX_MEDIA_PENDING_INPUT"
            --max-media-persisted-queued "$MAX_MEDIA_PERSISTED_QUEUED_INPUT"
            --max-media-persisted-running "$MAX_MEDIA_PERSISTED_RUNNING_INPUT"
            --max-recent-tool-errors "$MAX_RECENT_TOOL_ERRORS_INPUT"
            --max-recent-tool-rejections "$MAX_RECENT_TOOL_REJECTIONS_INPUT"
          )
          if [ "$STRICT_INPUT" = "true" ]; then
            args+=(--strict)
          fi
          uv run --extra dev python scripts/production_monitor_check.py "${args[@]}"
