name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: "Run opt-in E2E tests that require MINIMAX_API_KEY"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run --extra dev ruff check src tests

      - name: Compile Python
        run: uv run --extra dev python -m compileall -q src tests

      - name: Check Alembic head
        run: uv run --extra dev alembic heads

      - name: Test
        run: uv run --extra dev pytest tests --ignore=tests/e2e

      - name: Deterministic multi-agent E2E
        run: |
          uv run --extra dev pytest \
            tests/e2e/test_deterministic_collab_orchestrator_flow.py \
            tests/e2e/test_deterministic_multiagent_task_flow.py \
            tests/e2e/test_scheduled_task_queue_flow.py

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend_wip/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend_wip

      - name: Build
        run: npm run build
        working-directory: frontend_wip

  e2e:
    name: E2E
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_e2e }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Run E2E tests
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY || vars.MINIMAX_API_KEY }}
        run: |
          if [ -z "$MINIMAX_API_KEY" ]; then
            echo "MINIMAX_API_KEY is not configured; skipping E2E tests."
            exit 0
          fi
          uv run --extra dev pytest tests/e2e -m e2e -v --tb=short
