services:
  memox:
    build:
      context: .
      dockerfile: Dockerfile
    image: memox:local
    container_name: memox
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      MEMOX_CONFIG_PATH: /app/config.yaml
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:rw
      - ./data:/app/data
      - ./workspace:/app/workspace
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 60s
      retries: 3
