# MemoX - 配置文件

# 全局配置
app:
  name: "MemoX"
  debug: true
  log_level: "INFO"
  workspace: "./workspace"

# 服务器配置
server:
  host: "0.0.0.0"
  port: 8080
  cors_origins:
    - "http://localhost:8080"
    - "http://localhost:3000"
    - "http://23.236.66.33:8080"
    - "http://23.236.66.33:3000"

# Coordinator 配置
coordinator:
  model: "qwen3.6-plus"
  provider: "dashscope"
  temperature: 0.7
  max_tokens: 4096
  max_workers: 5  # 最多 5 个 Worker 并行
  task_timeout: 300

# 默认 Provider 配置
providers:
  anthropic:
    api_key: "${ANTHROPIC_API_KEY}"
    base_url: "https://api.anthropic.com"
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
  google:
    api_key: "${GOOGLE_API_KEY}"
    base_url: "https://generativelanguage.googleapis.com"
  minimax:
    api_key: "${MINIMAX_API_KEY}"
    base_url: "https://api.minimaxi.com/anthropic/v1"  # Anthropic 兼容端点 (Token Plan)
  kimi:
    api_key: "${KIMI_API_KEY}"
    base_url: "https://api.kimi.com/coding/v1"  # Kimi Coding Plan
    headers:
      User-Agent: "claude-code/0.1.0"  # Kimi Coding Plan requires this header
  dashscope:
    api_key: "${DASHSCOPE_API_KEY}"  # 阿里云 DashScope (OpenAI 兼容模式)
    base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"

# 文生图配置
image_generation:
  enabled: true
  provider: "dashscope"
  model: "qwen-image-2.0-pro"
  api_key: "${DASHSCOPE_API_KEY}"
  default_size: "1024*1024"

# 文生视频配置
video_generation:
  enabled: true
  provider: "dashscope"
  model: "wan2.7-t2v"
  api_key: "${DASHSCOPE_API_KEY}"
  default_resolution: "720P"
  default_ratio: "16:9"
  default_duration: 5

# 图生视频配置
image_to_video:
  enabled: true
  provider: "dashscope"
  model: "wan2.7-i2v"
  api_key: "${DASHSCOPE_API_KEY}"
  default_resolution: "720P"
  default_duration: 5

# Worker Agent 模板
worker_templates:
  code_worker:
    model: "kimi-latest"
    provider: "kimi"
    temperature: 0.7
    icon: "💻"
    display_name: "代码专家"
    skills:
    - "code-review"
    - "frontend-design-3"
    tools:
    - "filesystem"
    - "shell"
    - "git"
  
  research_worker:
    model: "MiniMax-M2.7-highspeed"
    provider: "minimax"
    temperature: 0.3
    skills:
    - "data-analysis"
    - "doc-coauthoring"
    tools:
    - "web_search"
    - "web_fetch"
  
  writer_worker:
    model: "kimi-coder"
    provider: "kimi"
    temperature: 0.9
    skills: ["docx", "pdf"]
    tools: ["filesystem"]


# 知识库配置
knowledge_base:
  vector_store: "chroma"
  persist_directory: "./data/chroma"
  upload_directory: "./data/uploads"
  skills_dir: "./data/skills"
  # Embedding 配置
  # 可选: "sentence-transformer" (本地), "openai", "dashscope"
  embedding_provider: "dashscope"  # 使用阿里云 DashScope
  embedding_model: "text-embedding-v3"  # DashScope 模型名称
  # embedding_model: "sentence-transformers/all-MiniLM-L6-v2"  # 本地模型
  chunk_size: 500
  chunk_overlap: 50
  top_k: 5
  # 混合搜索（BM25 + 向量 RRF 融合）
  hybrid_search:
    enabled: true
    bm25_persist_path: "./data/bm25_index.pkl"
    rrf_k: 60  # RRF 融合参数，越大越均衡
    chunk_strategy: "size"  # 分块策略: "size"=固定长度, "semantic"=语义分块
  # 知识图谱（实验性，LLM 抽取三元组 + NetworkX 图查询）
  enable_graph: true  # true=启用知识图谱，false=禁用
  graph_persist_path: "./data/knowledge_graph.gml"
  # LLM 抽取三元组的配置（enable_graph=true 时生效）
  graph_llm_provider: "dashscope"  # 用于三元组抽取的 LLM
  graph_llm_api_key: "${DASHSCOPE_API_KEY}"

# 记忆管理配置
memory:
  enabled: true
  max_turns_before_compress: 10  # 超过 N 轮对话时触发摘要压缩
  summary_max_chars: 500  # 摘要最大字符数
  recent_messages_to_keep: 4  # 摘要后保留最近 N 条消息不归档

# MCP 配置
mcp:
  github:
    enabled: false
  slack:
    enabled: false

# 认证配置（开发模式）
auth:
  enabled: true
  # 公开路径（无需登录）
  public_paths:
    - "/api/auth/login"
    - "/api/health"
    - "/api/docs"
    - "/api/openapi.json"
    - "/api/files/"
  # 开发测试用户（生产环境应改用数据库）
  users:
    - username: "admin"
      password: "${MEMOX_ADMIN_PASSWORD}"
      role: "admin"
      display_name: "管理员"

# 渠道配置
channels:
  web:
    enabled: true
  cli:
    enabled: true
